<!DOCTYPE html>
<html>
<head>
    <title>Spam Detection Project</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff);
            font-family: 'Trebuchet MS', sans-serif;
        }

        .box {
            background: rgba(229, 165, 3, 0.819);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 42px;
            font-weight: bold;
            color: #ff4ecd;
        }

        .title {
            font-size: 24px;
            color: #ffffff;
            margin-top: 10px;
        }

        .info {
            font-size: 18px;
            color: #17fde6;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="name">Ayesha Ansari</div>
    <div class="title">Email Spam Detection Project</div>
    <div class="info">Data Science Internship</div>
    <div class="info">Oasis Infobyte (OIBSIP)</div>
</div>

</body>
</html>
